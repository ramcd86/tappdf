name: tapPDF
version: 1.0.0

models:
  - name: Qwen2.5 Coder 7B
    provider: ollama
    model: qwen2.5-coder:7b
    contextLength: 32768
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.1
      maxTokens: 4096
    requestOptions:
      headers: {}
    modelArgs:
      num_ctx: 32768

  - name: Qwen2.5 Coder 7B (Autocomplete)
    provider: ollama
    model: qwen2.5-coder:7b
    contextLength: 32768
    roles:
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.05
      maxTokens: 512
    modelArgs:
      num_ctx: 32768

tabAutocomplete:
  disable: false
  useCopyBuffer: false
  useFileSuffix: true

context:
  - provider: code
  - provider: codebase
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder
  - provider: file

rules:
  - .continue/rules/base-info.md
